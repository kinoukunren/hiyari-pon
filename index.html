    body { font-family: 'Hiragino Sans', 'Meiryo', sans-serif; }
    .option-btn { transition: all 0.15s; }
    .option-btn.selected { background-color: #16a34a !important; color: white !important; border-color: #16a34a !important; font-weight: bold; }
    .nice-btn { transition: all 0.2s; }
    .nice-btn.liked { background-color: #fef3c7; border-color: #f59e0b; color: #d97706; }

    /* ===== お庭ビジュアル ===== */
    .garden-sky {
      position: relative; overflow: hidden; height: 240px;
      border-radius: 16px 16px 0 0;
      background: linear-gradient(180deg, #a8d8f0 0%, #c8eaf8 60%, #d4f1b8 100%);
    }
    .garden-ground {
      background: linear-gradient(180deg, #7ec850 0%, #5aaa2a 100%);
      border-radius: 0 0 16px 16px;
      padding: 12px 16px 16px;
    }
    .g-sun {
      position: absolute; top: 16px; right: 26px; font-size: 42px;
      animation: gSunSpin 10s linear infinite; transform-origin: center;
    }
    @keyframes gSunSpin { 0%{transform:rotate(0deg)} 100%{transform:rotate(360deg)} }
    .g-cloud { position: absolute; font-size: 26px; animation: gCloudDrift 9s ease-in-out infinite; }
    .g-cloud1 { top: 20px; left: 14px; }
    .g-cloud2 { top: 40px; left: 80px; font-size: 18px; animation-delay: 3s; }
    @keyframes gCloudDrift { 0%,100%{transform:translateX(0)} 50%{transform:translateX(10px)} }
    .g-tree { position: absolute; bottom: 0; font-size: 50px; animation: gTreeSway 4s ease-in-out infinite; transform-origin: bottom center; }
    .g-tree-l { left: 8px; }
    .g-tree-r { right: 8px; animation-delay: 1.5s; }
    @keyframes gTreeSway { 0%,100%{transform:rotate(-2deg)} 50%{transform:rotate(2deg)} }
    .g-butterfly { position: absolute; font-size: 20px; animation: gButterflyFly 6s ease-in-out infinite; }
    .g-b1 { top: 55px; left: 25px; }
    .g-b2 { top: 75px; right: 45px; animation-delay: 2s; }
    .g-b3 { top: 35px; left: 45%; animation-delay: 4s; }
    @keyframes gButterflyFly {
      0%{transform:translate(0,0)} 25%{transform:translate(18px,-14px)}
      50%{transform:translate(35px,4px)} 75%{transform:translate(18px,18px)} 100%{transform:translate(0,0)}
    }
    .g-bird { position: absolute; top: 45px; font-size: 17px; animation: gBirdFly 8s linear infinite; }
    @keyframes gBirdFly {
      0%{transform:translateX(-30px);opacity:0} 5%{opacity:1} 90%{opacity:1} 100%{transform:translateX(340px);opacity:0}
    }
    .g-star { position: absolute; font-size: 14px; animation: gStarTwinkle 2s ease-in-out infinite; }
    .g-s1 { top: 12px; left: 48px; }
    .g-s2 { top: 22px; right: 58px; animation-delay: 0.7s; }
    .g-s3 { top: 6px; left: 50%; animation-delay: 1.3s; }
    @keyframes gStarTwinkle { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.2;transform:scale(0.6)} }
    .g-rainbow {
      position: absolute; top: -10px; left: 50%; transform: translateX(-50%);
      font-size: 64px; animation: gRbPulse 3s ease-in-out infinite; opacity: 0.88;
    }
    @keyframes gRbPulse {
      0%,100%{transform:translateX(-50%) scale(1)} 50%{transform:translateX(-50%) scale(1.04)}
    }
    .g-fountain { position: absolute; bottom: 0; right: 14px; font-size: 24px; animation: gFtBounce 1.5s ease-in-out infinite; }
    @keyframes gFtBounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-5px)} }
    .g-plant-center { position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); text-align: center; z-index: 2; }
    .g-plant-big { font-size: 72px; animation: gPlantGrow 3s ease-in-out infinite; transform-origin: bottom center; display: block; }
    @keyframes gPlantGrow { 0%,100%{transform:scaleY(1) scaleX(1)} 50%{transform:scaleY(1.06) scaleX(0.96)} }
    .g-stage-badge {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
      background: rgba(255,255,255,0.82); border-radius: 24px; padding: 8px 28px;
      font-size: 28px; font-weight: bold; color: #1a6b0f; white-space: nowrap;
      letter-spacing: 2px; pointer-events: none;
      animation: gBadgePulse 3s ease-in-out infinite; z-index: 3;
    }
    @keyframes gBadgePulse {
      0%,100%{transform:translate(-50%,-50%) scale(1)} 50%{transform:translate(-50%,-50%) scale(1.04)}
    }
    .g-flowers-layer { position: absolute; bottom: 0; width: 100%; pointer-events: none; z-index: 1; }

    @keyframes gFlBob { 0%,100%{transform:translateY(0) rotate(-4deg)} 50%{transform:translateY(-7px) rotate(4deg)} }

let currentUnit = '';
let currentStaff = null;

// ============================================================
// PWA初期化
// ============================================================
(function initPWA() {
  const svgIcon = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
    <rect width="192" height="192" rx="32" fill="#16a34a"/>
    <text x="96" y="130" font-size="110" text-anchor="middle">🌸</text>
  </svg>`;
  const iconDataUrl = 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(svgIcon)));
  document.getElementById('appleIcon').href = iconDataUrl;
  const manifest = {
    name: 'ヒヤリポン2.0', short_name: 'ヒヤリポン',
    description: '安全文化を育てるヒヤリハット報告アプリ',
    start_url: '/', display: 'standalone',
    background_color: '#f9fafb', theme_color: '#16a34a', lang: 'ja',
    icons: [
      { src: iconDataUrl, sizes: '192x192', type: 'image/svg+xml' },
      { src: iconDataUrl, sizes: '512x512', type: 'image/svg+xml' }
    ]
  };
  const blob = new Blob([JSON.stringify(manifest)], { type: 'application/manifest+json' });
  document.getElementById('manifestLink').href = URL.createObjectURL(blob);
  if ('serviceWorker' in navigator) {
    const swCode = `
const CACHE = 'hiyaripon-v1';
const ASSETS = ['/'];
self.addEventListener('install', e => {
  e.waitUntil(caches.open(CACHE).then(c => c.addAll(ASSETS)).then(() => self.skipWaiting()));
});
self.addEventListener('activate', e => {
  e.waitUntil(caches.keys().then(keys =>
    Promise.all(keys.filter(k => k !== CACHE).map(k => caches.delete(k)))
  ).then(() => self.clients.claim()));
});
self.addEventListener('fetch', e => {
  const url = new URL(e.request.url);
  if (url.hostname.includes('script.google.com')) { e.respondWith(fetch(e.request)); return; }
  e.respondWith(
    fetch(e.request).then(res => {
      const clone = res.clone();
      caches.open(CACHE).then(c => c.put(e.request, clone));
      return res;
    }).catch(() => caches.match(e.request))
  );
});`;
    const swBlob = new Blob([swCode], { type: 'application/javascript' });
    navigator.serviceWorker.register(URL.createObjectURL(swBlob))
      .then(() => console.log('SW registered'))
      .catch(err => console.warn('SW error:', err));
  }
})();

// ============================================================
// アプリ本体
// ============================================================
window.onload = function() {
  const savedUnit = localStorage.getItem('hiyariUnit');
  if (savedUnit) { currentUnit = savedUnit; showStaffSelect(); }
};

function selectUnit(unit) {
  currentUnit = unit;
  localStorage.setItem('hiyariUnit', unit);
  showStaffSelect();
}

function changeUnit() {
  localStorage.removeItem('hiyariUnit');
  currentUnit = '';
  document.getElementById('unitSelectArea').classList.remove('hidden');
  document.getElementById('staffSelectArea').classList.add('hidden');
}

async function showStaffSelect() {
  document.getElementById('unitSelectArea').classList.add('hidden');
  document.getElementById('staffSelectArea').classList.remove('hidden');
  document.getElementById('unitLabel').textContent = currentUnit;
  const staffList = document.getElementById('staffList');
  staffList.innerHTML = '<p class="text-sm text-gray-400">読み込み中...</p>';
  try {
    const res = await fetch(`${GAS_URL}?action=getStaff&unit=${encodeURIComponent(currentUnit)}`);
    const json = await res.json();
    staffList.innerHTML = '';
    let filtered = currentUnit === '専門職'
      ? json.data.filter(s => s.unit === '専門職')
      : json.data.filter(s => s.unit === currentUnit);
    if (filtered.length === 0) {
      staffList.innerHTML = '<p class="text-sm text-gray-400">職員が見つかりません</p>';
      return;
    }
    filtered.forEach(staff => {
      const btn = document.createElement('button');
      btn.className = 'w-full text-left bg-gray-50 hover:bg-green-50 border border-gray-200 rounded-lg px-4 py-3 text-sm font-medium text-gray-700';
      btn.textContent = staff.name;
      btn.onclick = () => login(staff);
      staffList.appendChild(btn);
    });
  } catch(e) {
    staffList.innerHTML = '<p class="text-sm text-red-400">読み込みに失敗しました</p>';
  }
}

function login(staff) {
  currentStaff = staff;
  document.getElementById('loginScreen').classList.add('hidden');
  document.getElementById('mainScreen').classList.remove('hidden');
  document.getElementById('headerUnit').textContent = currentUnit;
  document.getElementById('headerStaff').textContent = staff.name + ' さん';
  showPage('garden');
}

function logout() {
  currentStaff = null;
  document.getElementById('mainScreen').classList.add('hidden');
  document.getElementById('loginScreen').classList.remove('hidden');
}

function showPage(page) {
  const area = document.getElementById('contentArea');
  if (page === 'garden') showGarden(area);
  if (page === 'report') showReport(area);
  if (page === 'library') showLibrary(area);
  if (page === 'forest') showForest(area);
  if (page === 'analysis') showAnalysis(area);
}

function gardenSetVisible(id, v) {
  var el = document.getElementById(id);
  if (!el) return;
  if (v) { el.classList.remove('g-hidden'); }
  else   { el.classList.add('g-hidden'); }
}

function renderGardenVisual(stage, niceToday) {
  var s = GARDEN_STAGES[stage] || GARDEN_STAGES['種'];

  document.getElementById('gPlantEmoji').textContent = s.emoji;
  document.getElementById('gStageBadge').textContent = stage;

  gardenSetVisible('gSun', niceToday);
  gardenSetVisible('gB1', s.butterfly);
  gardenSetVisible('gB2', s.butterfly);
  gardenSetVisible('gB3', s.butterfly && stage === '虹の庭');
  gardenSetVisible('gBird', s.bird);
  gardenSetVisible('gSt1', s.star);
  gardenSetVisible('gSt2', s.star);
  gardenSetVisible('gSt3', s.star);
  gardenSetVisible('gRainbow', s.rainbow);
  gardenSetVisible('gFountain', s.fountain);
  gardenSetVisible('gTreeL', s.trees);
  gardenSetVisible('gTreeR', s.trees);

  var sky = document.getElementById('gSky');
  if (stage === '虹の庭') {
    sky.style.background = 'linear-gradient(180deg,#ffe9f7 0%,#d4f0ff 40%,#d4f8d4 100%)';
  } else if (niceToday) {
    sky.style.background = 'linear-gradient(180deg,#ffe97a 0%,#a8d8f0 40%,#c8eaf8 70%,#d4f1b8 100%)';
  } else {
    sky.style.background = 'linear-gradient(180deg,#a8d8f0 0%,#c8eaf8 60%,#d4f1b8 100%)';
  }

  var layer = document.getElementById('gFlowersLayer');
  layer.innerHTML = '';
  var flowers = GARDEN_FLOWER_SETS[stage] || [];
  for (var i = 0; i < flowers.length; i++) {
    var f = flowers[i];
    var div = document.createElement('div');
    div.className = 'g-fl';
    div.textContent = f.e;
    div.style.left = f.x + 'px';
    div.style.fontSize = (f.s || 20) + 'px';
    div.style.animationDelay = (f.d || 0) + 's';
    if (f.u) div.style.bottom = f.u + 'px';
    layer.appendChild(div);
  }
}

const subCategories = {
  '転倒・転落': ['立ち上がり','歩行','車椅子','ベッド','トイレ'],
  '移動・移乗': ['ベッド⇔車椅子','トイレ移乗','入浴移乗'],
  '食事・服薬': ['誤嚥','むせ','配薬ミス','飲み忘れ'],
  '皮膚・外傷': ['打撲','内出血','擦り傷','裂傷','褥瘡'],
  '利用者行動': ['離棟','不穏','自己抜去'],
  '環境・設備': ['床','手すり','車椅子','福祉用具']
};

let selectedValues = {};

function selectOption(btn, field) {
  const parent = btn.parentElement;
  parent.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  selectedValues[field] = btn.dataset.value;
}

function selectCategory(btn, category) {
  selectOption(btn, 'category');
  const area = document.getElementById('subCategoryArea');
  const btns = document.getElementById('subCategoryBtns');
  if (subCategories[category]) {
    area.classList.remove('hidden');
    btns.innerHTML = subCategories[category].map(s =>
      `<button onclick="selectOption(this,'subCategory')" data-value="${s}" class="option-btn border-2 border-gray-200 rounded-xl py-3 text-base text-gray-600 hover:border-green-400">${s}</button>`
    ).join('');
  } else {
    area.classList.add('hidden');
    selectedValues.subCategory = '';
  }
}

async function submitReport() {
  if (!selectedValues.timeSlot || !selectedValues.location || !selectedValues.category) {
    alert('時間帯・発生場所・発生種別は必須です'); return;
  }
  const situation = document.getElementById('situation').value;
  if (!situation) { alert('発生状況を入力してください'); return; }
  const btn = document.querySelector('button[onclick="submitReport()"]');
  btn.textContent = '送信中...'; btn.disabled = true;
  try {
    const res = await fetch(GAS_URL, {
      method: 'POST',
      body: JSON.stringify({
        action: 'addReport', unit: currentUnit,
        staffId: currentStaff.id, staffName: currentStaff.name,
        incidentTime: new Date().toISOString(),
        timeSlot: selectedValues.timeSlot, location: selectedValues.location,
        category: selectedValues.category, subCategory: selectedValues.subCategory || '',
        situation: situation,
        response: document.getElementById('response').value,
        prevention: document.getElementById('prevention').value,
        shareOther: false
      })
    });
    const json = await res.json();
    if (json.success) {
      alert('報告しました！お庭が育ちます🌱');
      selectedValues = {};
      showPage('garden');
    } else {
      alert('エラーが発生しました');
      btn.textContent = '報告する 🌱'; btn.disabled = false;
    }
  } catch(e) {
    alert('送信に失敗しました');
    btn.textContent = '報告する 🌱'; btn.disabled = false;
  }
}

async function searchReports() {
  const keyword = document.getElementById('searchKeyword')?.value || '';
  const list = document.getElementById('reportList');
  list.innerHTML = '<p class="text-center text-gray-400 text-sm">読み込み中...</p>';
  try {
    const [reportsRes, niceRes] = await Promise.all([
      fetch(`${GAS_URL}?action=getReports&keyword=${encodeURIComponent(keyword)}`),
      fetch(`${GAS_URL}?action=getNiceCounts&staffId=${encodeURIComponent(currentStaff.id)}`)
    ]);
    const reportsJson = await reportsRes.json();
    const niceJson = await niceRes.json();
    const counts = niceJson.data ? niceJson.data.counts : {};
    const likedByMe = niceJson.data ? niceJson.data.likedByMe : {};
    if (reportsJson.data.length === 0) {
      list.innerHTML = '<p class="text-center text-gray-400 text-sm">報告がありません</p>'; return;
    }
    list.innerHTML = reportsJson.data.slice(0,20).map(r => {
      const niceCount = counts[r.id] || 0;
      const liked = likedByMe[r.id] || false;
      return `
        <div class="bg-white rounded-xl shadow-sm p-4">
          <div class="flex justify-between items-start mb-2">
            <span class="text-xs bg-green-100 text-green-700 px-2 py-1 rounded-full">${r.category}</span>
            <span class="text-xs text-gray-400">${r.unit}</span>
          </div>
          <p class="text-sm text-gray-700 mb-3">${r.situation}</p>
          ${r.prevention ? `<p class="text-xs text-blue-600 mb-3">💡 ${r.prevention}</p>` : ''}
          <button onclick="toggleNice('${r.id}', this)" class="nice-btn flex items-center gap-2 border-2 border-gray-200 rounded-xl px-4 py-2 text-sm font-medium text-gray-500 ${liked ? 'liked' : ''}">
            <span>☀️</span><span>ナイスヒヤリ！</span>
            ${niceCount > 0 ? `<span class="nice-count font-bold">${niceCount}</span>` : '<span class="nice-count"></span>'}
          </button>
        </div>`;
    }).join('');
  } catch(e) {
    list.innerHTML = '<p class="text-center text-red-400 text-sm">読み込みに失敗しました</p>';
  }
}

async function toggleNice(reportId, btn) {
  try {
    const res = await fetch(GAS_URL, {
      method: 'POST',
      body: JSON.stringify({ action: 'addNice', reportId, staffId: currentStaff.id, staffName: currentStaff.name })
    });
    const json = await res.json();
    if (json.success) {
      const countEl = btn.querySelector('.nice-count');
      const current = parseInt(countEl.textContent) || 0;
      if (json.action === 'added') { btn.classList.add('liked'); countEl.textContent = current + 1; }
      else { btn.classList.remove('liked'); countEl.textContent = current > 1 ? current - 1 : ''; }
    }
  } catch(e) { alert('送信に失敗しました'); }
}

async function showAnalysis(area) {
  area.innerHTML = '<div class="p-4 text-center text-gray-400">読み込み中...</div>';
  try {
    const res = await fetch(`${GAS_URL}?action=getSummary`);
    const json = await res.json();
    const d = json.data;
    function renderBar(data) {
      const max = Math.max(...Object.values(data), 1);
      return Object.entries(data).map(([k, v]) => `
        <div class="flex items-center gap-2 mb-3">
          <span class="text-sm text-gray-600 w-24 shrink-0">${k}</span>
          <div class="flex-1 bg-gray-100 rounded-full h-5">
            <div class="bg-green-400 h-5 rounded-full" style="width:${(v/max*100).toFixed(0)}%"></div>
          </div>
          <span class="text-sm font-bold text-gray-600 w-6 text-right">${v}</span>
        </div>`).join('');
    }
    area.innerHTML = `
      <div class="p-4 space-y-4">
        <h2 class="text-lg font-bold text-gray-700">📊 分析</h2>
        <div class="bg-white rounded-xl shadow-sm p-4"><h3 class="font-bold text-gray-700 mb-3">発生場所別</h3>${renderBar(d.byLocation)}</div>
        <div class="bg-white rounded-xl shadow-sm p-4"><h3 class="font-bold text-gray-700 mb-3">時間帯別</h3>${renderBar(d.byTimeSlot)}</div>
        <div class="bg-white rounded-xl shadow-sm p-4"><h3 class="font-bold text-gray-700 mb-3">発生種別</h3>${renderBar(d.byCategory)}</div>
        <div class="bg-white rounded-xl shadow-sm p-4"><h3 class="font-bold text-gray-700 mb-3">ユニット別</h3>${renderBar(d.byUnit)}</div>
      </div>`;
  } catch(e) {
    area.innerHTML = '<div class="p-4 text-center text-red-400">読み込みに失敗しました</div>';
  }
}
</script>
</body>
</html>
