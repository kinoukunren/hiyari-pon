<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ヒヤリポン2.0</title>

  <!-- PWA manifest（インライン生成） -->
  <link rel="manifest" id="manifestLink">

  <!-- iOSホーム画面追加対応 -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="ヒヤリポン">
  <link rel="apple-touch-icon" id="appleIcon">

  <!-- テーマカラー -->
  <meta name="theme-color" content="#16a34a">

  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: 'Hiragino Sans', 'Meiryo', sans-serif; }
    .garden-bg { background: linear-gradient(180deg, #87CEEB 0%, #98FB98 60%, #90EE90 100%); }
    .garden-bg-sunny { background: linear-gradient(180deg, #FFD700 0%, #87CEEB 30%, #98FB98 70%, #90EE90 100%); }
    .option-btn { transition: all 0.15s; }
    .option-btn.selected { background-color: #16a34a !important; color: white !important; border-color: #16a34a !important; font-weight: bold; }
    .nice-btn { transition: all 0.2s; }
    .nice-btn.liked { background-color: #fef3c7; border-color: #f59e0b; color: #d97706; }
    .sun { animation: sunPulse 2s ease-in-out infinite; }
    @keyframes sunPulse { 0%,100% { transform: scale(1); opacity:1; } 50% { transform: scale(1.1); opacity:0.9; } }
  </style>
</head>
<body class="bg-gray-50">

<!-- ログイン画面 -->
<div id="loginScreen" class="min-h-screen flex flex-col items-center justify-center p-4">
  <div class="bg-white rounded-2xl shadow-lg p-8 w-full max-w-sm">
    <h1 class="text-2xl font-bold text-center text-green-600 mb-2">🌸 ヒヤリポン2.0</h1>
    <p class="text-center text-gray-500 text-sm mb-6">安全文化を育てよう</p>

    <div id="unitSelectArea">
      <p class="text-sm font-medium text-gray-700 mb-2">ユニットを選択してください</p>
      <div class="grid grid-cols-3 gap-2 mb-4">
        <button onclick="selectUnit('専門職')" class="unit-btn bg-purple-100 text-purple-700 rounded-lg py-3 text-sm font-medium hover:bg-purple-200">専門職</button>
        <button onclick="selectUnit('2W')" class="unit-btn bg-green-100 text-green-700 rounded-lg py-3 text-sm font-medium hover:bg-green-200">2W</button>
        <button onclick="selectUnit('2E')" class="unit-btn bg-green-100 text-green-700 rounded-lg py-3 text-sm font-medium hover:bg-green-200">2E</button>
        <button onclick="selectUnit('3W')" class="unit-btn bg-blue-100 text-blue-700 rounded-lg py-3 text-sm font-medium hover:bg-blue-200">3W</button>
        <button onclick="selectUnit('3E')" class="unit-btn bg-blue-100 text-blue-700 rounded-lg py-3 text-sm font-medium hover:bg-blue-200">3E</button>
        <button onclick="selectUnit('4W')" class="unit-btn bg-yellow-100 text-yellow-700 rounded-lg py-3 text-sm font-medium hover:bg-yellow-200">4W</button>
        <button onclick="selectUnit('4E')" class="unit-btn bg-yellow-100 text-yellow-700 rounded-lg py-3 text-sm font-medium hover:bg-yellow-200">4E</button>
        <button onclick="selectUnit('5W')" class="unit-btn bg-red-100 text-red-700 rounded-lg py-3 text-sm font-medium hover:bg-red-200">5W</button>
        <button onclick="selectUnit('5E')" class="unit-btn bg-red-100 text-red-700 rounded-lg py-3 text-sm font-medium hover:bg-red-200">5E</button>
      </div>
    </div>

    <div id="staffSelectArea" class="hidden">
      <p class="text-sm text-gray-500 mb-1">ユニット</p>
      <p id="unitLabel" class="text-lg font-bold text-green-600 mb-4"></p>
      <p class="text-sm font-medium text-gray-700 mb-2">職員を選択してください</p>
      <div id="staffList" class="space-y-2 mb-4 max-h-60 overflow-y-auto"></div>
      <button onclick="changeUnit()" class="text-xs text-gray-400 underline">ユニットを変更する</button>
    </div>
  </div>
</div>

<!-- メイン画面 -->
<div id="mainScreen" class="hidden min-h-screen flex flex-col">

  <div class="bg-green-600 text-white px-4 py-3 flex items-center justify-between">
    <div>
      <p class="text-xs opacity-80" id="headerUnit"></p>
      <p class="font-bold" id="headerStaff"></p>
    </div>
    <button onclick="logout()" class="text-xs bg-green-700 px-3 py-1 rounded-full">ログアウト</button>
  </div>

  <div id="contentArea" class="flex-1 overflow-y-auto pb-20"></div>

  <div class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 flex justify-around py-2">
    <button onclick="showPage('garden')" class="nav-btn flex flex-col items-center text-xs text-gray-500 px-2">
      <span class="text-xl">🏡</span><span>お庭</span>
    </button>
    <button onclick="showPage('report')" class="nav-btn flex flex-col items-center text-xs text-gray-500 px-2">
      <span class="text-xl">📝</span><span>新規報告</span>
    </button>
    <button onclick="showPage('library')" class="nav-btn flex flex-col items-center text-xs text-gray-500 px-2">
      <span class="text-xl">📚</span><span>図書館</span>
    </button>
    <button onclick="showPage('forest')" class="nav-btn flex flex-col items-center text-xs text-gray-500 px-2">
      <span class="text-xl">🌳</span><span>みんなの森</span>
    </button>
    <button onclick="showPage('analysis')" class="nav-btn flex flex-col items-center text-xs text-gray-500 px-2">
      <span class="text-xl">📊</span><span>分析</span>
    </button>
  </div>
</div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbw5A4vzZ8cmQKnD_WLG7gUSHdL_yIbpBNURU83wlceF9CmaELiGQDAsMcCpUz3MzyQ/exec';

let currentUnit = '';
let currentStaff = null;

// ============================================================
// PWA初期化
// ============================================================
(function initPWA() {
  // SVGアイコンをBase64で生成（外部ファイル不要）
  const svgIcon = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
    <rect width="192" height="192" rx="32" fill="#16a34a"/>
    <text x="96" y="130" font-size="110" text-anchor="middle">🌸</text>
  </svg>`;
  const iconDataUrl = 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(svgIcon)));

  // apple-touch-icon にセット
  document.getElementById('appleIcon').href = iconDataUrl;

  // manifest.json をBlobで生成しリンク
  const manifest = {
    name: 'ヒヤリポン2.0',
    short_name: 'ヒヤリポン',
    description: '安全文化を育てるヒヤリハット報告アプリ',
    start_url: '/',
    display: 'standalone',
    background_color: '#f9fafb',
    theme_color: '#16a34a',
    lang: 'ja',
    icons: [
      { src: iconDataUrl, sizes: '192x192', type: 'image/svg+xml' },
      { src: iconDataUrl, sizes: '512x512', type: 'image/svg+xml' }
    ]
  };
  const blob = new Blob([JSON.stringify(manifest)], { type: 'application/manifest+json' });
  document.getElementById('manifestLink').href = URL.createObjectURL(blob);

  // Service Worker 登録
  if ('serviceWorker' in navigator) {
    const swCode = `
const CACHE = 'hiyaripon-v1';
const ASSETS = ['/'];

self.addEventListener('install', e => {
  e.waitUntil(
    caches.open(CACHE).then(c => c.addAll(ASSETS)).then(() => self.skipWaiting())
  );
});

self.addEventListener('activate', e => {
  e.waitUntil(
    caches.keys().then(keys =>
      Promise.all(keys.filter(k => k !== CACHE).map(k => caches.delete(k)))
    ).then(() => self.clients.claim())
  );
});

self.addEventListener('fetch', e => {
  const url = new URL(e.request.url);

  // GAS（外部API）はキャッシュしない・必ずネットワーク
  if (url.hostname.includes('script.google.com')) {
    e.respondWith(fetch(e.request));
    return;
  }

  // アプリ本体：ネットワーク優先、失敗時キャッシュ
  e.respondWith(
    fetch(e.request)
      .then(res => {
        const clone = res.clone();
        caches.open(CACHE).then(c => c.put(e.request, clone));
        return res;
      })
      .catch(() => caches.match(e.request))
  );
});
    `;
    const swBlob = new Blob([swCode], { type: 'application/javascript' });
    const swUrl = URL.createObjectURL(swBlob);
    navigator.serviceWorker.register(swUrl)
      .then(() => console.log('SW registered'))
      .catch(err => console.warn('SW error:', err));
  }
})();

// ============================================================
// アプリ本体
// ============================================================
window.onload = function() {
  const savedUnit = localStorage.getItem('hiyariUnit');
  if (savedUnit) {
    currentUnit = savedUnit;
    showStaffSelect();
  }
};

function selectUnit(unit) {
  currentUnit = unit;
  localStorage.setItem('hiyariUnit', unit);
  showStaffSelect();
}

function changeUnit() {
  localStorage.removeItem('hiyariUnit');
  currentUnit = '';
  document.getElementById('unitSelectArea').classList.remove('hidden');
  document.getElementById('staffSelectArea').classList.add('hidden');
}

async function showStaffSelect() {
  document.getElementById('unitSelectArea').classList.add('hidden');
  document.getElementById('staffSelectArea').classList.remove('hidden');
  document.getElementById('unitLabel').textContent = currentUnit;

  const staffList = document.getElementById('staffList');
  staffList.innerHTML = '<p class="text-sm text-gray-400">読み込み中...</p>';

  try {
    const res = await fetch(`${GAS_URL}?action=getStaff&unit=${encodeURIComponent(currentUnit)}`);
    const json = await res.json();
    staffList.innerHTML = '';

    let filtered = json.data;
    if (currentUnit !== '専門職') {
      filtered = json.data.filter(s => s.unit === currentUnit);
    } else {
      filtered = json.data.filter(s => s.unit === '専門職');
    }

    if (filtered.length === 0) {
      staffList.innerHTML = '<p class="text-sm text-gray-400">職員が見つかりません</p>';
      return;
    }
    filtered.forEach(staff => {
      const btn = document.createElement('button');
      btn.className = 'w-full text-left bg-gray-50 hover:bg-green-50 border border-gray-200 rounded-lg px-4 py-3 text-sm font-medium text-gray-700';
      btn.textContent = staff.name;
      btn.onclick = () => login(staff);
      staffList.appendChild(btn);
    });
  } catch(e) {
    staffList.innerHTML = '<p class="text-sm text-red-400">読み込みに失敗しました</p>';
  }
}

function login(staff) {
  currentStaff = staff;
  document.getElementById('loginScreen').classList.add('hidden');
  document.getElementById('mainScreen').classList.remove('hidden');
  document.getElementById('headerUnit').textContent = currentUnit;
  document.getElementById('headerStaff').textContent = staff.name + ' さん';
  showPage('garden');
}

function logout() {
  currentStaff = null;
  document.getElementById('mainScreen').classList.add('hidden');
  document.getElementById('loginScreen').classList.remove('hidden');
}

function showPage(page) {
  const area = document.getElementById('contentArea');
  if (page === 'garden') showGarden(area);
  if (page === 'report') showReport(area);
  if (page === 'library') showLibrary(area);
  if (page === 'forest') showForest(area);
  if (page === 'analysis') showAnalysis(area);
}

// お庭ページ
async function showGarden(area) {
  area.innerHTML = '<div class="p-4 text-center text-gray-400">読み込み中...</div>';
  try {
    const [gardenRes, niceRes] = await Promise.all([
      fetch(`${GAS_URL}?action=getGarden&unit=${encodeURIComponent(currentUnit)}`),
      fetch(`${GAS_URL}?action=getMyNiceToday&staffId=${encodeURIComponent(currentStaff.id)}`)
    ]);
    const gardenJson = await gardenRes.json();
    const niceJson = await niceRes.json();

    const g = gardenJson.data;
    const niceToday = niceJson.data ? niceJson.data.niceToday : false;
    const totalNice = niceJson.data ? niceJson.data.totalNice : 0;

    const stageEmoji = {
      '種': '🌱', '双葉': '🌿', 'つぼみ': '🌼',
      '開花': '🌸', '満開': '🌺', '銀の庭': '⚪🌸',
      '金の庭': '🌟🌸', '虹の庭': '🌈🌸'
    };

    const total = g ? g.totalCount : 0;
    const monthly = g ? g.monthlyCount : 0;
    const stage = g ? g.stage : '種';
    const emoji = stageEmoji[stage] || '🌱';

    let nextCount = '';
    if (total < 3) nextCount = `あと ${3 - total} 件`;
    else if (total < 7) nextCount = `あと ${7 - total} 件`;
    else if (total < 12) nextCount = `あと ${12 - total} 件`;
    else if (total < 20) nextCount = `あと ${20 - total} 件`;
    else if (total < 50) nextCount = `あと ${50 - total} 件`;
    else if (total < 100) nextCount = `あと ${100 - total} 件`;
    else if (total < 200) nextCount = `あと ${200 - total} 件`;
    else nextCount = '最高段階🎉';

    area.innerHTML = `
      <div class="${niceToday ? 'garden-bg-sunny' : 'garden-bg'} min-h-64 flex flex-col items-center justify-center p-8 relative">
        ${niceToday ? '<div class="sun absolute top-4 left-1/2 -translate-x-1/2 text-5xl">☀️</div>' : ''}
        <div class="text-8xl mb-2 mt-8">${emoji}</div>
        <div class="text-white font-bold text-xl drop-shadow">${stage}</div>
        ${g && g.butterfly ? '<span class="absolute top-16 left-8 text-3xl animate-bounce">🦋</span>' : ''}
        ${g && g.bird ? '<span class="absolute top-16 right-8 text-3xl">🐦</span>' : ''}
        ${g && g.star ? '<span class="absolute bottom-8 left-8 text-2xl">⭐</span>' : ''}
        ${g && g.rainbow ? '<span class="absolute top-2 left-1/3 text-4xl">🌈</span>' : ''}
        ${g && g.fountain ? '<span class="absolute bottom-4 right-8 text-3xl">⛲</span>' : ''}
      </div>
      ${niceToday ? `
      <div class="mx-4 mt-3 bg-yellow-50 border border-yellow-200 rounded-xl px-4 py-3 flex items-center gap-2">
        <span class="text-xl">☀️</span>
        <p class="text-sm text-yellow-700 font-medium">今日、あなたの報告に日光が当たっています！</p>
      </div>` : ''}
      <div class="p-4 space-y-3">
        <div class="bg-white rounded-xl p-4 shadow-sm">
          <div class="grid grid-cols-2 gap-4 text-center mb-3">
            <div><p class="text-2xl font-bold text-green-600">${monthly}</p><p class="text-xs text-gray-500">今月</p></div>
            <div><p class="text-2xl font-bold text-green-600">${total}</p><p class="text-xs text-gray-500">累計</p></div>
          </div>
          <div class="border-t border-gray-100 pt-3 grid grid-cols-2 gap-4 text-center">
            <div class="flex flex-col items-center">
              <p class="text-lg">💧</p>
              <p class="text-xl font-bold text-blue-500">${total}</p>
              <p class="text-xs text-gray-500">水やり（報告）</p>
            </div>
            <div class="flex flex-col items-center">
              <p class="text-lg">☀️</p>
              <p class="text-xl font-bold text-yellow-500">${totalNice}</p>
              <p class="text-xs text-gray-500">日光（ナイスヒヤリ）</p>
            </div>
          </div>
          <div class="mt-3 text-center">
            <p class="text-sm font-medium text-green-600">${nextCount}</p>
            <p class="text-xs text-gray-400">次の成長まで</p>
          </div>
        </div>
        <button onclick="showPage('report')" class="w-full bg-green-500 text-white rounded-xl py-4 font-bold text-lg shadow">
          📝 ヒヤリハットを報告する
        </button>
      </div>
    `;
  } catch(e) {
    area.innerHTML = '<div class="p-4 text-center text-red-400">読み込みに失敗しました</div>';
  }
}

// 新規報告ページ
function showReport(area) {
  area.innerHTML = `
    <div class="p-4">
      <h2 class="text-lg font-bold text-gray-700 mb-4">📝 新規報告</h2>
      <div class="bg-white rounded-xl shadow-sm p-4 space-y-5">

        <div>
          <label class="text-base font-bold text-gray-700 block mb-3">⏰ 発生時間帯 <span class="text-red-500">*</span></label>
          <div class="grid grid-cols-3 gap-3">
            ${['早朝','午前','午後','夕方','夜間'].map(t =>
              `<button onclick="selectOption(this,'timeSlot')" data-value="${t}" class="option-btn border-2 border-gray-200 rounded-xl py-3 text-base text-gray-600 hover:border-green-400">${t}</button>`
            ).join('')}
          </div>
        </div>

        <div>
          <label class="text-base font-bold text-gray-700 block mb-3">📍 発生場所 <span class="text-red-500">*</span></label>
          <div class="grid grid-cols-3 gap-3">
            ${['居室','トイレ','浴室','食堂','廊下','その他'].map(l =>
              `<button onclick="selectOption(this,'location')" data-value="${l}" class="option-btn border-2 border-gray-200 rounded-xl py-3 text-base text-gray-600 hover:border-green-400">${l}</button>`
            ).join('')}
          </div>
        </div>

        <div>
          <label class="text-base font-bold text-gray-700 block mb-3">📋 発生種別 <span class="text-red-500">*</span></label>
          <div class="grid grid-cols-2 gap-3">
            ${['転倒・転落','移動・移乗','食事・服薬','皮膚・外傷','利用者行動','環境・設備','気づき・提案','その他'].map(c =>
              `<button onclick="selectCategory(this,'${c}')" data-value="${c}" class="option-btn border-2 border-gray-200 rounded-xl py-3 text-base text-gray-600 hover:border-green-400">${c}</button>`
            ).join('')}
          </div>
        </div>

        <div id="subCategoryArea" class="hidden">
          <label class="text-base font-bold text-gray-700 block mb-3">🔍 詳細分類</label>
          <div id="subCategoryBtns" class="grid grid-cols-2 gap-3"></div>
        </div>

        <div>
          <label class="text-base font-bold text-gray-700 block mb-2">📝 発生状況 <span class="text-red-500">*</span></label>
          <textarea id="situation" rows="3" class="w-full border-2 border-gray-200 rounded-xl p-3 text-base focus:border-green-400 focus:outline-none" placeholder="何が起きたか記載してください"></textarea>
        </div>

        <div>
          <label class="text-base font-bold text-gray-700 block mb-2">🩺 対応内容</label>
          <textarea id="response" rows="2" class="w-full border-2 border-gray-200 rounded-xl p-3 text-base focus:border-green-400 focus:outline-none" placeholder="任意"></textarea>
        </div>

        <div>
          <label class="text-base font-bold text-gray-700 block mb-2">💡 再発防止策</label>
          <textarea id="prevention" rows="2" class="w-full border-2 border-gray-200 rounded-xl p-3 text-base focus:border-green-400 focus:outline-none" placeholder="任意"></textarea>
        </div>

        <button onclick="submitReport()" class="w-full bg-green-500 text-white rounded-xl py-4 font-bold text-lg shadow-lg">
          報告する 🌱
        </button>
      </div>
    </div>
  `;
}

const subCategories = {
  '転倒・転落': ['立ち上がり','歩行','車椅子','ベッド','トイレ'],
  '移動・移乗': ['ベッド⇔車椅子','トイレ移乗','入浴移乗'],
  '食事・服薬': ['誤嚥','むせ','配薬ミス','飲み忘れ'],
  '皮膚・外傷': ['打撲','内出血','擦り傷','裂傷','褥瘡'],
  '利用者行動': ['離棟','不穏','自己抜去'],
  '環境・設備': ['床','手すり','車椅子','福祉用具']
};

let selectedValues = {};

function selectOption(btn, field) {
  const parent = btn.parentElement;
  parent.querySelectorAll('.option-btn').forEach(b => {
    b.classList.remove('selected');
  });
  btn.classList.add('selected');
  selectedValues[field] = btn.dataset.value;
}

function selectCategory(btn, category) {
  selectOption(btn, 'category');
  const area = document.getElementById('subCategoryArea');
  const btns = document.getElementById('subCategoryBtns');
  if (subCategories[category]) {
    area.classList.remove('hidden');
    btns.innerHTML = subCategories[category].map(s =>
      `<button onclick="selectOption(this,'subCategory')" data-value="${s}" class="option-btn border-2 border-gray-200 rounded-xl py-3 text-base text-gray-600 hover:border-green-400">${s}</button>`
    ).join('');
  } else {
    area.classList.add('hidden');
    selectedValues.subCategory = '';
  }
}

async function submitReport() {
  if (!selectedValues.timeSlot || !selectedValues.location || !selectedValues.category) {
    alert('時間帯・発生場所・発生種別は必須です');
    return;
  }
  const situation = document.getElementById('situation').value;
  if (!situation) { alert('発生状況を入力してください'); return; }

  const btn = document.querySelector('button[onclick="submitReport()"]');
  btn.textContent = '送信中...';
  btn.disabled = true;

  try {
    const res = await fetch(GAS_URL, {
      method: 'POST',
      body: JSON.stringify({
        action: 'addReport',
        unit: currentUnit,
        staffId: currentStaff.id,
        staffName: currentStaff.name,
        incidentTime: new Date().toISOString(),
        timeSlot: selectedValues.timeSlot,
        location: selectedValues.location,
        category: selectedValues.category,
        subCategory: selectedValues.subCategory || '',
        situation: situation,
        response: document.getElementById('response').value,
        prevention: document.getElementById('prevention').value,
        shareOther: false
      })
    });
    const json = await res.json();
    if (json.success) {
      alert('報告しました！お庭が育ちます🌱');
      selectedValues = {};
      showPage('garden');
    } else {
      alert('エラーが発生しました');
      btn.textContent = '報告する 🌱';
      btn.disabled = false;
    }
  } catch(e) {
    alert('送信に失敗しました');
    btn.textContent = '報告する 🌱';
    btn.disabled = false;
  }
}

// ヒヤリ図書館
async function showLibrary(area) {
  area.innerHTML = `
    <div class="p-4">
      <h2 class="text-lg font-bold text-gray-700 mb-4">📚 ヒヤリ図書館</h2>
      <div class="bg-white rounded-xl shadow-sm p-4 mb-4">
        <input id="searchKeyword" type="text" placeholder="キーワード検索" class="w-full border-2 border-gray-200 rounded-xl px-3 py-2 text-base mb-2 focus:border-green-400 focus:outline-none">
        <button onclick="searchReports()" class="w-full bg-green-500 text-white rounded-xl py-3 text-base font-medium">検索</button>
      </div>
      <div id="reportList" class="space-y-3"></div>
    </div>
  `;
  searchReports();
}

async function searchReports() {
  const keyword = document.getElementById('searchKeyword')?.value || '';
  const list = document.getElementById('reportList');
  list.innerHTML = '<p class="text-center text-gray-400 text-sm">読み込み中...</p>';
  try {
    const [reportsRes, niceRes] = await Promise.all([
      fetch(`${GAS_URL}?action=getReports&keyword=${encodeURIComponent(keyword)}`),
      fetch(`${GAS_URL}?action=getNiceCounts&staffId=${encodeURIComponent(currentStaff.id)}`)
    ]);
    const reportsJson = await reportsRes.json();
    const niceJson = await niceRes.json();

    const counts = niceJson.data ? niceJson.data.counts : {};
    const likedByMe = niceJson.data ? niceJson.data.likedByMe : {};

    if (reportsJson.data.length === 0) {
      list.innerHTML = '<p class="text-center text-gray-400 text-sm">報告がありません</p>';
      return;
    }

    list.innerHTML = reportsJson.data.slice(0,20).map(r => {
      const niceCount = counts[r.id] || 0;
      const liked = likedByMe[r.id] || false;
      return `
        <div class="bg-white rounded-xl shadow-sm p-4">
          <div class="flex justify-between items-start mb-2">
            <span class="text-xs bg-green-100 text-green-700 px-2 py-1 rounded-full">${r.category}</span>
            <span class="text-xs text-gray-400">${r.unit}</span>
          </div>
          <p class="text-sm text-gray-700 mb-3">${r.situation}</p>
          ${r.prevention ? `<p class="text-xs text-blue-600 mb-3">💡 ${r.prevention}</p>` : ''}
          <button onclick="toggleNice('${r.id}', this)" class="nice-btn flex items-center gap-2 border-2 border-gray-200 rounded-xl px-4 py-2 text-sm font-medium text-gray-500 ${liked ? 'liked' : ''}">
            <span>☀️</span>
            <span>ナイスヒヤリ！</span>
            ${niceCount > 0 ? `<span class="nice-count font-bold">${niceCount}</span>` : '<span class="nice-count"></span>'}
          </button>
        </div>
      `;
    }).join('');
  } catch(e) {
    list.innerHTML = '<p class="text-center text-red-400 text-sm">読み込みに失敗しました</p>';
  }
}

async function toggleNice(reportId, btn) {
  try {
    const res = await fetch(GAS_URL, {
      method: 'POST',
      body: JSON.stringify({
        action: 'addNice',
        reportId: reportId,
        staffId: currentStaff.id,
        staffName: currentStaff.name
      })
    });
    const json = await res.json();
    if (json.success) {
      const countEl = btn.querySelector('.nice-count');
      const current = parseInt(countEl.textContent) || 0;
      if (json.action === 'added') {
        btn.classList.add('liked');
        countEl.textContent = current + 1;
      } else {
        btn.classList.remove('liked');
        countEl.textContent = current > 1 ? current - 1 : '';
      }
    }
  } catch(e) {
    alert('送信に失敗しました');
  }
}

// みんなの森
async function showForest(area) {
  area.innerHTML = '<div class="p-4 text-center text-gray-400">読み込み中...</div>';
  try {
    const res = await fetch(`${GAS_URL}?action=getRanking`);
    const json = await res.json();
    const medals = ['🥇','🥈','🥉'];
    const stageEmoji = {
      '種': '🌱', '双葉': '🌿', 'つぼみ': '🌼',
      '開花': '🌸', '満開': '🌺', '銀の庭': '⚪🌸',
      '金の庭': '🌟🌸', '虹の庭': '🌈🌸'
    };
    area.innerHTML = `
      <div class="p-4">
        <h2 class="text-lg font-bold text-gray-700 mb-4">🌳 みんなの森</h2>
        <div class="space-y-3">
          ${json.data.map((r, i) => `
            <div class="bg-white rounded-xl shadow-sm p-4 flex items-center justify-between">
              <div class="flex items-center gap-3">
                <span class="text-2xl">${medals[i] || (i+1)+'位'}</span>
                <div>
                  <p class="font-bold text-gray-700">${r.unit}</p>
                  <p class="text-xs text-gray-400">${r.stage} ${stageEmoji[r.stage] || ''}</p>
                </div>
              </div>
              <p class="text-2xl font-bold text-green-600">${r.totalCount}<span class="text-sm text-gray-400">件</span></p>
            </div>
          `).join('')}
        </div>
      </div>
    `;
  } catch(e) {
    area.innerHTML = '<div class="p-4 text-center text-red-400">読み込みに失敗しました</div>';
  }
}

// 分析ページ
async function showAnalysis(area) {
  area.innerHTML = '<div class="p-4 text-center text-gray-400">読み込み中...</div>';
  try {
    const res = await fetch(`${GAS_URL}?action=getSummary`);
    const json = await res.json();
    const d = json.data;

    function renderBar(data) {
      const max = Math.max(...Object.values(data), 1);
      return Object.entries(data).map(([k, v]) => `
        <div class="flex items-center gap-2 mb-3">
          <span class="text-sm text-gray-600 w-24 shrink-0">${k}</span>
          <div class="flex-1 bg-gray-100 rounded-full h-5">
            <div class="bg-green-400 h-5 rounded-full" style="width:${(v/max*100).toFixed(0)}%"></div>
          </div>
          <span class="text-sm font-bold text-gray-600 w-6 text-right">${v}</span>
        </div>
      `).join('');
    }

    area.innerHTML = `
      <div class="p-4 space-y-4">
        <h2 class="text-lg font-bold text-gray-700">📊 分析</h2>
        <div class="bg-white rounded-xl shadow-sm p-4">
          <h3 class="font-bold text-gray-700 mb-3">発生場所別</h3>
          ${renderBar(d.byLocation)}
        </div>
        <div class="bg-white rounded-xl shadow-sm p-4">
          <h3 class="font-bold text-gray-700 mb-3">時間帯別</h3>
          ${renderBar(d.byTimeSlot)}
        </div>
        <div class="bg-white rounded-xl shadow-sm p-4">
          <h3 class="font-bold text-gray-700 mb-3">発生種別</h3>
          ${renderBar(d.byCategory)}
        </div>
        <div class="bg-white rounded-xl shadow-sm p-4">
          <h3 class="font-bold text-gray-700 mb-3">ユニット別</h3>
          ${renderBar(d.byUnit)}
        </div>
      </div>
    `;
  } catch(e) {
    area.innerHTML = '<div class="p-4 text-center text-red-400">読み込みに失敗しました</div>';
  }
}
</script>
</body>
